apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flipkart-route
  namespace: kgateway-ns
spec:
  parentRefs:
    - name: surya-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /flipkart
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /flipkart
      backendRefs:
        - name: flipkart-svc
          port: 81